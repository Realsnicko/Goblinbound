<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      transition: background-color 0.1s, color 0.1s;
    }

    body.dark-mode {
      background-color: #121212;
      color: #f9f9f9;
    }
  </style>
</head>
<body>

<button id="theme-toggle">Toggle Dark Mode</button>

<h1>GoblinBound Web UI</h1>

<div id="uid-display">UID: <i>Not verified</i></div>
<button id="attack-btn">Battle</button>
<button id="inv-btn">Inventory</button>
<button id="potion-btn">Use Potion</button>
<button id="shop-btn">List Shop Items</button>
<button id="ver-btn">Verify With OAuth2</button>

<pre id="output"></pre>

<script>
  const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");
const username = params.get("username");

if (uid) {
  document.getElementById("uid-display").innerHTML =
    `UID: <b>${uid}</b>`;
  document.getElementById("output").innerText =
    `Discord Verified!\nUID: ${uid}\nUsername: ${username}`;
}

  // Dark mode toggle
  const toggleBtn = document.getElementById('theme-toggle');
  toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
  });

  // API calls
  async function attack() {
    const uid = document.getElementById("uid-display").innerText.replace("UID: ", "");
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/battle?uid=${uid}`);
    const text = await response.text();
    document.getElementById("output").innerText = text;
  }

  async function loadInventory() {
    const uid = document.getElementById("uid-display").innerText.replace("UID: ", "");
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/inventory?uid=${uid}`);
    const text = await response.text();
    document.getElementById("output").innerText = text;
  }

  async function heal() {
    const uid = document.getElementById("uid-display").innerText.replace("UID: ", "");
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/heal?uid=${uid}`);
    const text = await response.text();
    document.getElementById("output").innerText = text;
  }
  async function shop() {
    const res = await fetch("https://pull-bradford-argue-stable.trycloudflare.com/shop");
    const data = await res.json();

    let output = "=== Shop ===\n\n";

    // Clear output first
    document.getElementById("output").innerText = "";

    // Create a container for clickable items
    const container = document.createElement("div");

    for (const [item, price] of Object.entries(data)) {
      const btn = document.createElement("button");
      btn.innerText = `${item} — ${price} gold`;
      btn.style.display = "block";
      btn.style.margin = "6px 0";
      btn.style.padding = "10px";
      btn.style.width = "20%";

      // When clicked → buy the item
      btn.addEventListener("click", () => buyItem(item));

      container.appendChild(btn);
    }

    document.getElementById("output").appendChild(container);
  }
  async function buyItem(item) {
  const uid = document.getElementById("uid-display").innerText.replace("UID: ", "");

  const res = await fetch(
    `https://pull-bradford-argue-stable.trycloudflare.com/buy?uid=${uid}&item=${encodeURIComponent(item)}`
  );

  const data = await res.json();

  document.getElementById("output").innerText =
    `You bought: ${item}\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
}
  // OAuth2 constants
  const CLIENT_ID = "1480463795272028192";
  const REDIRECT_URI = encodeURIComponent("https://pull-bradford-argue-stable.trycloudflare.com/oauth2/callback");
  const AUTH_URL = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${REDIRECT_URI}&scope=identify`;

  // OAuth2 button
  function verify() {
    window.location.href = AUTH_URL;
  }

  // Handle OAuth2 callback
  async function handleOAuth() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) return; // No OAuth2 code → do nothing

    document.getElementById("uid-display").innerHTML =
      `UID: <b>${uid}</b>`;

    const res = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/oauth2/callback?code=${code}`);
    const data = await res.json();

    document.getElementById("output").innerText =
      `Discord Verified!\n\nUID: ${data.uid}\nUsername: ${data.username}\nGlobal Name: ${data.global_name}`;
  }

  // Wire buttons
  document.getElementById("attack-btn").addEventListener("click", attack);
  document.getElementById("inv-btn").addEventListener("click", loadInventory);
  document.getElementById("potion-btn").addEventListener("click", heal);
  document.getElementById("shop-btn").addEventListener("click", shop);
  document.getElementById("ver-btn").addEventListener("click", verify);

  // Run OAuth handler on page load
  handleOAuth();
</script>

</body>
</html>
