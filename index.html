<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      transition: background-color 0.1s, color 0.1s;
    }

    body.dark-mode {
      background-color: #121212;
      color: #f9f9f9;
    }
  </style>
</head>
<body>

<button id="theme-toggle">Toggle Dark Mode</button>

<h1>GoblinBound Web UI</h1>

<input id="uid" placeholder="Enter UID">
<button id="attack-btn">Battle</button>
<button id="inv-btn">Inventory</button>
<button id="potion-btn">Use Potion</button>

<pre id="output"></pre>

<script>
  // Dark mode toggle
  const toggleBtn = document.getElementById('theme-toggle');
  toggleBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
  });

  // Battle
  async function attack() {
    const uid = document.getElementById("uid").value;
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/battle?uid=${uid}`);
    const text = await response.text();
    document.getElementById("output").innerText = text;
  }

  // Inventory
  async function loadInventory() {
    const uid = document.getElementById("uid").value;
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/inventory?uid=${uid}`);
    const text = await response.text();
    document.getElementById("output").innerText = text;
  }

  async function heal() {
    const uid = document.getElementById("uid").value;
    const response = await fetch(`https://pull-bradford-argue-stable.trycloudflare.com/heal?uid=${uid}`)
  }
  // Correct button wiring
  document.getElementById("attack-btn").addEventListener("click", attack);
  document.getElementById("inv-btn").addEventListener("click", loadInventory);
</script>

</body>
</html>
